services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-debug-postgres
    environment:
      POSTGRES_USER: aidebug
      POSTGRES_PASSWORD: aidebug_secret
      POSTGRES_DB: ai_debug
    ports:
      - "5435:5432"  # 5435 avoids conflict with local PostgreSQL 13 (5433) and 18 (5434) on Windows
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations/001_initial.sql:/docker-entrypoint-initdb.d/001_initial.sql

volumes:
  postgres_data:
